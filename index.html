<!DOCTYPE html>
<html>
<head>
    <title>WeatherGuardian</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h1>🌦 WeatherGuardian</h1>

<table>

<tr>
<td>Status</td>
<td id="status">Online</td>
</tr>

<tr>
<td>Temperature</td>
<td id="temp">-- °C</td>
</tr>

<tr>
<td>Humidity</td>
<td id="humidity">-- %</td>
</tr>

<tr>
<td>Wind</td>
<td id="wind">-- km/h</td>
</tr>

<tr>
<td>WiFi</td>
<td id="wifi">-- dBm</td>
</tr>

</table>

<button onclick="loadData()">Refresh</button>

</div>

<script src="script.js"></script>

</body>
</html>
